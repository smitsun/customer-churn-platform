version: '3.8'

services:
  api:
    build: .
    container_name: churn_api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1

  dashboard:
    build: .
    container_name: churn_dashboard
    command: streamlit run src/dashboard.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8505:8501"  # Maps host port 8505 to Streamlit port 8501 to avoid conflicts
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - api
